<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
    body{
    background-image: url(hearttttt.png);
    }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>te amo</title>
</head>
<body>
    <audio autoplay>
        <source src="lovelikey.mp3" type="audio/mpeg">
    </audio>
    
    <div id="scree">
        <h1 class="teamo"> te amo.</h1>
        <img id="img" src="1.jpg">
    </div>
</body>

<script>
    const img = document.getElementById("img");
    const scr = document.getElementById("scree");
    const imgs = ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg","11.jpg""12.jpg","13.jpg","14.jpg","15.jpg","16.jpg","17.jpg","18.jpg","19.jpg","20.jpg","21.jpg""22.jpg","23.jpg","24.jpg","25.jpg"]


    const largSCR = scr.clientWidth;
    const altSCR = scr.clientHeight;
    const largIMG = img.clientWidth;
    const altIMG = img.clientHeight;


    let x = 0;
    let y = 0;

    let vx = 3;
    let vy = 3;
    let atual = 0; 
    let chngcontrol = true;

        function changeimg(){
        atual++;

        if (atual >= imgs.length){
            atual = Math.floor(Math.random() * imgs.length);
        }
               img.src = imgs[atual];
    }

    function loop(){
        x += vx;
        y += vy;

        let hitX = false;
        let hitY = false;

        img.style.left = x + "px";
        img.style.top = y + "px";

        

        if(x <= 0 || x + largIMG >= largSCR){
        vx = -vx;
        hitX = true;

    }
        if(y <= 0 || y + altIMG >= altSCR){
        vy = -vy;
        hitY = true;
        
    }

    


 
    if((hitX || hitY) && chngcontrol)
    {
        changeimg();
        chngcontrol = false;
    } if(!hitX || hitY){

        chngcontrol = true;

    }

    requestAnimationFrame(loop);
    }

    loop();


    
    
  

</script>
</html>
